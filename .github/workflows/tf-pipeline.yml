name: "Terraform Deploy"
on:
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
env:
  PROJECT_ID: new-map-project-1538399427267
  TF_STATE_BUCKET: dbt-tf-state-logs-2026-test
  TF_STATE_PREFIX: state-logsv2.0
jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: ./infra
    steps:
    - uses: actions/checkout@v4
    - uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: 'projects/995265336172/locations/global/workloadIdentityPools/github-dbt-pool/providers/github-dbt-provider'
        service_account: 'github-actions-dbt@new-map-project-1538399427267.iam.gserviceaccount.com'
    - uses: hashicorp/setup-terraform@v3
    - name: Validate Service Usage API Access
      run: |
        set +e
        SERVICE_USAGE_CHECK=$(gcloud services list --enabled \
          --project="${PROJECT_ID}" \
          --filter="config.name:serviceusage.googleapis.com" \
          --format="value(config.name)" 2>&1)
        CHECK_EXIT_CODE=$?
        set -e

        if [ ${CHECK_EXIT_CODE} -ne 0 ]; then
          echo "Unable to query enabled services for project ${PROJECT_ID}."
          echo "Most likely causes:"
          echo "1) Service Usage API is disabled in the project."
          echo "2) The deploy service account lacks permissions to view/manage services."
          echo "Action: Enable serviceusage.googleapis.com once using an Owner-level account, then rerun."
          echo "Console URL: https://console.developers.google.com/apis/api/serviceusage.googleapis.com/overview?project=995265336172"
          echo "Underlying gcloud error:"
          echo "${SERVICE_USAGE_CHECK}"
          exit 1
        fi

        if [ -z "${SERVICE_USAGE_CHECK}" ]; then
          echo "serviceusage.googleapis.com is not enabled for project ${PROJECT_ID}."
          echo "Enable it once using an Owner-level account and rerun this workflow."
          echo "Console URL: https://console.developers.google.com/apis/api/serviceusage.googleapis.com/overview?project=995265336172"
          exit 1
        fi
    - name: Validate Terraform Backend Config
      run: |
        if [ -z "${TF_STATE_BUCKET}" ]; then
          echo "TF_STATE_BUCKET is not set in tf-pipeline.yml."
          exit 1
        fi

        if [ -z "${TF_STATE_PREFIX}" ]; then
          echo "TF_STATE_PREFIX is not set in tf-pipeline.yml."
          exit 1
        fi
    - run: terraform init -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="prefix=${TF_STATE_PREFIX}"
    - id: resolve_tfvars
      name: Resolve Terraform Vars File
      run: |
        if [ -f "prod.tfvars" ]; then
          echo "var_file=prod.tfvars" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [ -f "prod.tfvars.example" ]; then
          echo "prod.tfvars not found. Using prod.tfvars.example for this run."
          echo "var_file=prod.tfvars.example" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "No Terraform vars file found in infra/."
        echo "Expected one of: prod.tfvars, prod.tfvars.example"
        exit 1
    - run: terraform apply -var-file="${{ steps.resolve_tfvars.outputs.var_file }}" -auto-approve