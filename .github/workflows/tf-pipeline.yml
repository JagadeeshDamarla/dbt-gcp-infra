name: "Terraform Deploy"
on:
  workflow_dispatch:
permissions:
  contents: read
  id-token: write
env:
  PROJECT_ID: new-map-project-1538399427267
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
  TF_STATE_PREFIX: ${{ vars.TF_STATE_PREFIX }}
jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: ./infra/environments/prod
    steps:
    - uses: actions/checkout@v4
    - uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: 'projects/995265336172/locations/global/workloadIdentityPools/github-dbt-pool/providers/github-dbt-provider'
        service_account: 'github-actions-dbt@new-map-project-1538399427267.iam.gserviceaccount.com'
    - uses: hashicorp/setup-terraform@v3
    - name: Bootstrap Required GCP APIs
      run: |
        gcloud services enable \
          serviceusage.googleapis.com \
          cloudresourcemanager.googleapis.com \
          iam.googleapis.com \
          --project=${PROJECT_ID}
    - name: Validate Terraform Backend Variables
      run: |
        if [ -z "${TF_STATE_BUCKET}" ]; then
          echo "Missing TF_STATE_BUCKET GitHub variable."
          echo "Set it to your GCS bucket name for Terraform state."
          exit 1
        fi

        if [ -z "${TF_STATE_PREFIX}" ]; then
          echo "Missing TF_STATE_PREFIX GitHub variable."
          echo "Set it to a state prefix, for example: dbt-gcp-infra/prod"
          exit 1
        fi
    - run: terraform init -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="prefix=${TF_STATE_PREFIX}"
    - id: resolve_tfvars
      name: Resolve Terraform Vars File
      run: |
        if [ -f "prod.tfvars" ]; then
          echo "var_file=prod.tfvars" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [ -f "prod.tfvars.example" ]; then
          echo "prod.tfvars not found. Using prod.tfvars.example for this run."
          echo "var_file=prod.tfvars.example" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "No Terraform vars file found in infra/environments/prod."
        echo "Expected one of: prod.tfvars, prod.tfvars.example"
        exit 1
    - run: terraform apply -var-file="${{ steps.resolve_tfvars.outputs.var_file }}" -auto-approve