name: "Terraform Deploy"
on:
  workflow_dispatch:
concurrency:
  group: terraform-prod
  cancel-in-progress: false
permissions:
  contents: read
  id-token: write
env:
  PROJECT_ID: new-map-project-1538399427267
  TF_STATE_BUCKET: dbt-tf-state-logs-2026-test
  TF_STATE_PREFIX: state-logsv2.0
  TF_INPUT: "false"
  TF_LOCK_TIMEOUT: 10m
  ALLOW_WORKFLOW_RECREATE_ON_STATE_RESET: "true"
jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: prod
    defaults:
      run:
        working-directory: ./infra
    steps:
    - uses: actions/checkout@v4
    - uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: 'projects/995265336172/locations/global/workloadIdentityPools/github-dbt-pool/providers/github-dbt-provider'
        service_account: 'github-actions-dbt@new-map-project-1538399427267.iam.gserviceaccount.com'
    - uses: hashicorp/setup-terraform@v3
    - run: terraform init -backend-config="bucket=${TF_STATE_BUCKET}" -backend-config="prefix=${TF_STATE_PREFIX}"
    - id: resolve_tfvars
      name: Resolve Terraform Vars File
      run: |
        if [ -f "prod.tfvars" ]; then
          echo "var_file=prod.tfvars" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        if [ -f "prod.tfvars.example" ]; then
          echo "prod.tfvars not found. Using prod.tfvars.example for this run."
          echo "var_file=prod.tfvars.example" >> "$GITHUB_OUTPUT"
          exit 0
        fi

        echo "No Terraform vars file found in infra/."
        echo "Expected one of: prod.tfvars, prod.tfvars.example"
        exit 1
    - name: Import Existing Resources Into State
      run: |
        set -euo pipefail

        VAR_FILE="${{ steps.resolve_tfvars.outputs.var_file }}"

        REGION_VALUE="$(awk -F'=' '/^region[[:space:]]*=/{gsub(/["[:space:]]/, "", $2); print $2; exit}' "$VAR_FILE")"
        if [ -z "${REGION_VALUE}" ]; then
          REGION_VALUE="us-central1"
        fi

        ARTIFACT_REPO_ID="$(awk -F'=' '/^artifact_registry_repository_id[[:space:]]*=/{gsub(/["[:space:]]/, "", $2); print $2; exit}' "$VAR_FILE")"
        if [ -z "${ARTIFACT_REPO_ID}" ]; then
          ARTIFACT_REPO_ID="dbt-images"
        fi

        extract_local_value() {
          local file_path="$1"
          local key="$2"
          awk -F'"' -v k="$key" '$0 ~ "^[[:space:]]*"k"[[:space:]]*=" && $2 != "" {print $2; exit}' "$file_path"
        }

        import_if_missing_in_state() {
          local address="$1"
          local import_id="$2"

          if terraform state show "$address" >/dev/null 2>&1; then
            echo "State already contains $address"
            return 0
          fi

          echo "Importing $address"
          terraform import -lock-timeout="${TF_LOCK_TIMEOUT}" -var-file="$VAR_FILE" "$address" "$import_id"
        }

        maybe_import_artifact_repo() {
          if gcloud artifacts repositories describe "$ARTIFACT_REPO_ID" --project="$PROJECT_ID" --location="$REGION_VALUE" >/dev/null 2>&1; then
            import_if_missing_in_state \
              "google_artifact_registry_repository.dbt_images" \
              "projects/${PROJECT_ID}/locations/${REGION_VALUE}/repositories/${ARTIFACT_REPO_ID}"
          else
            echo "Artifact Registry repo ${ARTIFACT_REPO_ID} not found. Terraform will create it."
          fi
        }

        maybe_import_pipeline_resources() {
          local module_prefix="$1"
          local tf_file="$2"

          local job_name
          local workflow_name

          job_name="$(extract_local_value "$tf_file" "job_name")"
          workflow_name="$(extract_local_value "$tf_file" "workflow_name")"

          if [ -z "$job_name" ] || [ -z "$workflow_name" ]; then
            echo "Skipping $tf_file because job_name/workflow_name could not be resolved."
            return 0
          fi

          if gcloud run jobs describe "$job_name" --project="$PROJECT_ID" --region="$REGION_VALUE" >/dev/null 2>&1; then
            import_if_missing_in_state \
              "module.${module_prefix}_cloud_run_job.google_cloud_run_v2_job.this" \
              "projects/${PROJECT_ID}/locations/${REGION_VALUE}/jobs/${job_name}"
          else
            echo "Cloud Run Job ${job_name} not found. Terraform will create it."
          fi

          if gcloud workflows describe "$workflow_name" --project="$PROJECT_ID" --location="$REGION_VALUE" >/dev/null 2>&1; then
            if terraform state show "module.${module_prefix}_workflows.google_workflows_workflow.this" >/dev/null 2>&1; then
              echo "State already contains module.${module_prefix}_workflows.google_workflows_workflow.this"
            elif [ "${ALLOW_WORKFLOW_RECREATE_ON_STATE_RESET}" = "true" ]; then
              echo "Workflow ${workflow_name} exists but google_workflows_workflow does not support import; deleting existing workflow so Terraform can recreate it."
              gcloud workflows delete "$workflow_name" --project="$PROJECT_ID" --location="$REGION_VALUE" --quiet
            else
              echo "Workflow ${workflow_name} exists outside state and cannot be imported by provider."
              echo "Set ALLOW_WORKFLOW_RECREATE_ON_STATE_RESET=true to let the workflow be deleted and recreated automatically."
              exit 1
            fi
          else
            echo "Workflow ${workflow_name} not found. Terraform will create it."
          fi

          local scheduler_name
          scheduler_name="${workflow_name}-scheduler"
          if gcloud scheduler jobs describe "$scheduler_name" --project="$PROJECT_ID" --location="$REGION_VALUE" >/dev/null 2>&1; then
            import_if_missing_in_state \
              "module.${module_prefix}_workflows.google_cloud_scheduler_job.workflow_trigger" \
              "projects/${PROJECT_ID}/locations/${REGION_VALUE}/jobs/${scheduler_name}"
          else
            echo "Scheduler ${scheduler_name} not found. Terraform will create it."
          fi
        }

        maybe_import_artifact_repo
        maybe_import_pipeline_resources "dbt_airflow_test" "dbt_airflow_test.tf"
        maybe_import_pipeline_resources "dbt_project_2" "dbt_project_2.tf"
    - name: Terraform Plan
      run: terraform plan -input=false -lock-timeout="${TF_LOCK_TIMEOUT}" -var-file="${{ steps.resolve_tfvars.outputs.var_file }}" -out=tfplan
    - name: Terraform Apply
      run: terraform apply -input=false -lock-timeout="${TF_LOCK_TIMEOUT}" -auto-approve tfplan